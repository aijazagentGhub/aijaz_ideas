<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz | Strategy Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* Sky Blue Background */
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
        }
        .task-row:hover { background-color: #f8fafc; transition: 0.2s; }
        .default-placeholder { opacity: 0.3; font-weight: normal !important; }
        
        /* Vertical column separators */
        .col-sep { border-right: 1px solid #e2e8f0; }
        
        /* Themed date picker icon */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(48%) sepia(79%) saturate(2476%) hue-rotate(170deg) brightness(94%) contrast(92%);
            cursor: pointer;
        }
    </style>
</head>
<body class="p-4 md:p-10 font-sans text-slate-800">

    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-sky-200">
        <div class="p-8 border-b border-sky-100 flex flex-wrap gap-4 justify-between items-end bg-white">
            <div>
                <h1 class="text-3xl font-black text-sky-600 uppercase tracking-tight">Aijaz Execution Board</h1>
                <p id="entryCounter" class="text-sky-400 text-sm font-bold mt-1">Total Entries: 0</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportToCSV()" class="border-2 border-sky-400 text-sky-600 px-6 py-2 rounded-full font-bold hover:bg-sky-400 hover:text-white transition-all active:scale-95">
                    Export Ideas
                </button>
                <button onclick="addEntry()" class="bg-sky-500 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-sky-600 hover:shadow-sky-200 transition-all active:scale-95">
                    + New Entry
                </button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead class="bg-sky-50 text-[11px] font-bold text-sky-500 uppercase tracking-widest">
                    <tr>
                        <th class="px-8 py-4 text-left w-52 col-sep">Execution Date</th>
                        <th class="px-8 py-4 text-left col-sep">Task Description</th>
                        <th class="px-8 py-4 w-44 text-center col-sep">Status</th>
                        <th class="px-8 py-4 w-16 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0", 
            projectId: "aijazideas",
            appId: "1:822948950064:web:031df081b41175ef3a7df5",
            databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const entriesRef = db.ref('entries');

        const getTodayStr = () => new Date().toISOString().split('T')[0];

        entriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('tableBody');
            const counter = document.getElementById('entryCounter');
            body.innerHTML = '';
            
            if (data) {
                const keys = Object.keys(data).reverse();
                // Update Counter
                counter.innerText = `Total Entries: ${keys.length}`;

                keys.forEach((key) => {
                    const item = data[key];
                    const isDefault = item.task === "Add your Entry";
                    
                    const tr = document.createElement('tr');
                    tr.className = "task-row group";
                    tr.innerHTML = `
                        <td class="px-8 py-5 col-sep">
                            <input type="date" 
                                   value="${item.displayDate || getTodayStr()}" 
                                   onchange="updateRow('${key}', 'displayDate', this.value)"
                                   class="bg-transparent text-sm font-bold text-sky-600 outline-none cursor-pointer">
                        </td>
                        <td class="px-8 py-5 col-sep">
                            <input type="text" 
                                   value="${item.task}" 
                                   onfocus="if(this.value==='Add your Entry') this.select()"
                                   onchange="updateRow('${key}', 'task', this.value)" 
                                   class="w-full bg-transparent font-semibold text-slate-700 outline-none focus:text-sky-600 transition-colors ${isDefault ? 'default-placeholder' : ''}">
                        </td>
                        <td class="px-8 py-5 text-center col-sep">
                            <select onchange="updateRow('${key}', 'status', this.value)" 
                                    class="p-2 px-4 rounded-full text-[10px] font-black uppercase border cursor-pointer transition-all ${item.status === 'Done' ? 'bg-green-50 border-green-200 text-green-600' : 'bg-sky-50 border-sky-200 text-sky-600'}">
                                <option ${item.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option ${item.status === 'Done' ? 'selected' : ''}>Done</option>
                            </select>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <button onclick="deleteRow('${key}')" class="text-slate-300 hover:text-red-400 transition-colors font-bold text-lg">✕</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } else {
                counter.innerText = `Total Entries: 0`;
            }
        });

        function addEntry() {
            entriesRef.push({
                task: "Add your Entry",
                status: "Pending",
                displayDate: getTodayStr(),
                timestamp: Date.now()
            });
        }

        function updateRow(key, field, value) {
            db.ref('entries/' + key).update({ [field]: value });
        }

        function deleteRow(key) {
            if(confirm("Permanently remove this entry?")) db.ref('entries/' + key).remove();
        }

        function exportToCSV() {
            entriesRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return alert("Nothing to export yet!");
                let csvContent = "Date,Task Description,Status\n";
                Object.values(data).forEach(item => {
                    const date = item.displayDate || "N/A";
                    const cleanTask = item.task.replace(/,/g, " ");
                    csvContent += `${date},${cleanTask},${item.status}\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Aijaz_Board_Export_${getTodayStr()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }
    </script>
</body>
</html>
