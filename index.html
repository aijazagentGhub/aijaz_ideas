<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathon Tracker - Responsive & Collapsible</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --ice-blue: #e0f2fe;
            --alert-red: #dc2626;
            --row-alt: #f8fafc;   
            --border-color: #cbd5e1;
            --color-completed: #16a34a;
            --color-pending: #ca8a04;
            --color-missed: #dc2626;
            --header-teal: #008080;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f1f5f9; color: #1e293b; display: flex; height: 100vh; overflow: hidden; }

        /* --- COLLAPSIBLE SIDEBAR --- */
        .sidebar { width: 240px; background: white; border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.3s ease; position: relative; }
        .sidebar.collapsed { width: 60px; padding: 20px 10px; }
        .sidebar.collapsed .logo, .sidebar.collapsed .nav-text { display: none; }
        
        .logo { font-weight: 800; color: var(--primary-blue); font-size: 1.2rem; margin-bottom: 30px; white-space: nowrap; }
        .toggle-btn { position: absolute; top: 20px; right: -15px; background: var(--primary-blue); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; z-index: 10; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .nav-link { text-decoration: none; color: var(--primary-blue); font-weight: 600; padding: 12px; border-radius: 8px; background: #eff6ff; display: flex; align-items: center; gap: 10px; }

        /* --- MAIN CONTENT --- */
        .main-pane { flex-grow: 1; padding: 20px; overflow-y: auto; background: linear-gradient(rgba(241, 245, 249, 0.92), rgba(241, 245, 249, 0.92)), url('https://raw.githubusercontent.com/aijazagentGhub/aijaz_ideas/main/background.png'); background-size: cover; background-attachment: fixed; }
        
        /* --- RED ALERT BANNER --- */
        @keyframes blinker { 50% { opacity: 0.3; } }
        .banner-container { display: flex; justify-content: center; width: 100%; margin-bottom: 20px; }
        .upcoming-banner { 
            background: var(--alert-red); 
            color: white; 
            padding: 12px 25px; 
            border-radius: 8px; 
            display: inline-block;
            border: 3px solid #991b1b;
            text-align: center;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
            animation: blinker 0.5s linear 5;
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .header-row h1 { margin: 0; font-size: 1.5rem; font-weight: 800; color: #334155; }

        /* --- RESPONSIVE SUMMARY --- */
        .summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; }
        .stat-card p { margin: 5px 0 0; font-size: 1.4rem; font-weight: 800; }

        /* --- TABLE SCROLLING --- */
        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: var(--ice-blue); padding: 12px; border: 1px solid var(--border-color); font-weight: 800; text-align: left; font-size: 0.8rem; }
        td { padding: 10px; border: 1px solid var(--border-color); font-size: 0.85rem; font-weight: 600; }
        
        tbody tr:nth-child(even) { background-color: var(--row-alt); }
        tbody tr:hover { background-color: var(--ice-blue) !important; }

        input, select, .editable { width: 100%; border: none; background: transparent; outline: none; font-family: inherit; font-size: inherit; font-weight: inherit; color: inherit; }
        
        .btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .btn-new { background: var(--primary-blue); color: white; }
        .btn-csv { background: var(--header-teal); color: white; }

        .pagination { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 30px; }
        .page-btn { padding: 5px 12px; border: 1px solid var(--border-color); background: white; border-radius: 4px; }
        .page-btn.active { background: var(--primary-blue); color: white; }

        /* --- MOBILE SPECIFIC --- */
        @media (max-width: 600px) {
            .sidebar { display: none; } /* Hide sidebar on very small screens for better focus */
            .main-pane { padding: 15px; }
            .header-row h1 { font-size: 1.2rem; }
            .stat-card p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">↔</button>
        <div class="logo">FLUXION</div>
        <nav>
            <a href="#" class="nav-link">
                <span>🏃</span>
                <span class="nav-text">Marathon Tracker</span>
            </a>
        </nav>
    </div>

    <div class="main-pane">
        <div class="banner-container">
            <div class="upcoming-banner" id="upcomingBanner" style="display: none;">
                Upcoming event! : <span id="bannerContent">...</span>
            </div>
        </div>

        <div class="header-row">
            <h1>Marathon Tracker</h1>
            <div style="display: flex; gap: 5px;">
                <button class="btn btn-new" onclick="addNewRow()">+ Add</button>
                <button class="btn btn-csv" onclick="exportToCSV()">Export</button>
            </div>
        </div>

        <div class="summary-bar">
            <div class="stat-card"><h3>Comp.</h3><p id="stat-completed" style="color:var(--color-completed)">0</p></div>
            <div class="stat-card"><h3>Pend.</h3><p id="stat-pending" style="color:var(--color-pending)">0</p></div>
            <div class="stat-card"><h3>Missed</h3><p id="stat-missed" style="color:var(--color-missed)">0</p></div>
            <div class="stat-card"><h3>Total ₹</h3><p id="stat-total-paid">0</p></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Marathon Name</th>
                        <th style="width: 100px;">Distance (KM)</th>
                        <th style="width: 130px;">Date</th>
                        <th style="width: 110px;">Status</th>
                        <th>Location</th>
                        <th style="width: 100px;">Paid (₹)</th>
                        <th style="width: 40px; text-align: center;"></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="pagination" id="paginationControls"></div>

        <div class="table-container" style="max-width: 600px;">
            <table>
                <thead>
                    <tr><th colspan="6" style="text-align: center;">Yearly Summary Breakdown</th></tr>
                    <tr style="font-size: 0.75rem;">
                        <th>Year</th><th>Runs</th><th>Comp.</th><th>Pend.</th><th>Miss.</th><th>Paid (₹)</th>
                    </tr>
                </thead>
                <tbody id="yearlyBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0",
  authDomain: "aijazideas.firebaseapp.com",
  databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aijazideas",
  storageBucket: "aijazideas.firebasestorage.app",
  messagingSenderId: "822948950064",
  appId: "1:822948950064:web:031df081b41175ef3a7df5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allItems = [];
        let currentPage = 1;
        const rowsPerPage = 4;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function updateStats(items) {
            let comp = 0, pend = 0, miss = 0, total = 0;
            let yearlyData = {};
            items.forEach(item => {
                const s = (item.status || 'Pending').toLowerCase();
                const amt = parseFloat(item.amount) || 0;
                if (s === 'completed') comp++; else if (s === 'missed') miss++; else pend++;
                total += amt;
                if (item.date) {
                    const year = new Date(item.date).getFullYear();
                    if (!isNaN(year)) {
                        if (!yearlyData[year]) yearlyData[year] = { count: 0, comp: 0, pend: 0, miss: 0, paid: 0 };
                        yearlyData[year].count++;
                        const key = s === 'completed' ? 'comp' : (s === 'missed' ? 'miss' : 'pend');
                        yearlyData[year][key]++;
                        yearlyData[year].paid += amt;
                    }
                }
            });
            document.getElementById('stat-completed').innerText = comp;
            document.getElementById('stat-pending').innerText = pend;
            document.getElementById('stat-missed').innerText = miss;
            document.getElementById('stat-total-paid').innerText = total.toLocaleString('en-IN');
            const yBody = document.getElementById('yearlyBody');
            yBody.innerHTML = "";
            Object.keys(yearlyData).sort((a,b) => b-a).forEach(year => {
                const yd = yearlyData[year];
                yBody.innerHTML += `<tr><td>${year}</td><td>${yd.count}</td><td>${yd.comp}</td><td>${yd.pend}</td><td>${yd.miss}</td><td>${yd.paid.toLocaleString('en-IN')}</td></tr>`;
            });
        }

        function updateUpcomingBanner(items) {
            const today = new Date();
            const future = items.filter(i => i.date && new Date(i.date) >= today && (i.status || 'Pending') === 'Pending')
                                .sort((a, b) => new Date(a.date) - new Date(b.date));
            const banner = document.getElementById('upcomingBanner');
            if (future.length > 0) {
                const d = new Date(future[0].date).toLocaleDateString('en-GB');
                document.getElementById('bannerContent').innerText = `${d}, ${future[0].name || 'TBD'}`;
                banner.style.display = 'inline-block';
            } else { banner.style.display = 'none'; }
        }

        function renderTable() {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = "";
            const paginated = allItems.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);
            paginated.forEach(item => {
                const row = document.createElement("tr");
                const status = item.status || 'Pending';
                row.innerHTML = `
                    <td><div class="editable" contenteditable="true" onblur="updateDB('${item.id}', 'name', this.innerText)">${item.name || ''}</div></td>
                    <td><div class="editable" contenteditable="true" onblur="updateDB('${item.id}', 'distance', this.innerText)">${item.distance || ''}</div></td>
                    <td><input type="date" value="${item.date || ''}" onchange="updateDB('${item.id}', 'date', this.value)"></td>
                    <td class="status-${status}"><select onchange="updateDB('${item.id}', 'status', this.value)"><option value="Pending" ${status === 'Pending' ? 'selected' : ''}>Pending</option><option value="Completed" ${status === 'Completed' ? 'selected' : ''}>Completed</option><option value="Missed" ${status === 'Missed' ? 'selected' : ''}>Missed</option></select></td>
                    <td><div class="editable" contenteditable="true" onblur="updateDB('${item.id}', 'location', this.innerText)">${item.location || 'Bangalore'}</div></td>
                    <td><input type="number" value="${item.amount || ''}" onblur="updateDB('${item.id}', 'amount', this.value)"></td>
                    <td><button style="color:red; background:none; border:none; cursor:pointer;" onclick="deleteFromDB('${item.id}')">×</button></td>
                `;
                tableBody.appendChild(row);
            });
            renderPagination();
        }

        function renderPagination() {
            const controls = document.getElementById("paginationControls");
            controls.innerHTML = "";
            const pageCount = Math.ceil(allItems.length / rowsPerPage);
            if (pageCount <= 1) return;
            for (let i = 1; i <= pageCount; i++) {
                const btn = document.createElement("button");
                btn.innerText = i; btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { currentPage = i; renderTable(); };
                controls.appendChild(btn);
            }
        }

        function loadData() {
            db.ref('marathons').on('value', (s) => {
                const data = s.val();
                if (data) {
                    allItems = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                    allItems.sort((a, b) => {
                        const sA = (a.status || 'Pending') === 'Pending' ? 0 : 1;
                        const sB = (b.status || 'Pending') === 'Pending' ? 0 : 1;
                        if (sA !== sB) return sA - sB;
                        return new Date(a.date) - new Date(b.date);
                    });
                    updateStats(allItems);
                    updateUpcomingBanner(allItems);
                    renderTable();
                } else { allItems = []; renderTable(); }
            });
        }

        function addNewRow() {
            const today = new Date().toISOString().split('T')[0];
            db.ref('marathons').push({ name: "", distance: "", date: today, status: "Pending", location: "Bangalore", amount: 0 });
        }

        function updateDB(id, field, value) { db.ref('marathons/' + id).update({ [field]: value }); }
        function deleteFromDB(id) { if(confirm("Delete?")) db.ref('marathons/' + id).remove(); }
        
        function exportToCSV() {
            let csv = "Name,Distance,Date,Status,Location,Amount\n";
            allItems.forEach(i => csv += `"${i.name}","${i.distance}","${i.date}","${i.status}","${i.location}","${i.amount}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Marathons.csv'; a.click();
        }

        loadData();
    </script>
</body>
</html>
