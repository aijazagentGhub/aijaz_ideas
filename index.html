<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FLUXION - Personal Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <h1 class="logo">FLUXION</h1>
            <ul>
                <li onclick="loadTab('marathon')" id="nav-marathon" class="active"><span>🏃</span> Marathon Tracker</li>
                <li onclick="loadTab('ideas')" id="nav-ideas"><span>💡</span> Idea Vault</li>
                <li onclick="loadTab('expenses')" id="nav-expenses"><span>💰</span> Daily Expenses</li>
            </ul>
        </div>

        <div id="content-area" class="main-content">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script type="module">
        import { renderMarathon } from './marathon.js';

        // 1. YOUR FIREBASE CONFIG (Copy from your backup file)
        const firebaseConfig = {
apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0",
  authDomain: "aijazideas.firebaseapp.com",
  databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aijazideas",
  storageBucket: "aijazideas.firebasestorage.app",
  messagingSenderId: "822948950064",
  appId: "1:822948950064:web:031df081b41175ef3a7df5"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // 2. Tab Switcher
        window.loadTab = function(tab) {
            document.querySelectorAll('.sidebar li').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + tab).classList.add('active');

            if (tab === 'marathon') {
                renderMarathon(db);
            } else {
                document.getElementById('content-area').innerHTML = `<h2 style="color:#1a237e;">${tab.toUpperCase()}</h2><p>Working on this tab next!</p>`;
            }
        };

        // 3. Load Marathon by default
        window.onload = () => loadTab('marathon');
    </script>
</body>
</html>
