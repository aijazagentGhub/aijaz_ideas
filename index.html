<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz | Strategic Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a; /* Deep professional navy */
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        /* Style for the date and select to look modern */
        input[type="date"], select {
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        input[type="date"]:hover, select:hover {
            border-color: #6366f1;
            background: #f8fafc;
        }
        .status-badge-pending { background: #fef3c7; color: #92400e; }
        .status-badge-done { background: #dcfce7; color: #166534; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-5xl mx-auto glass-card overflow-hidden">
        <div class="p-8 border-b border-gray-100 bg-white flex flex-col md:flex-row md:items-center justify-between">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tight">Execution Board</h1>
                <p class="text-slate-500 font-medium mt-1" id="currentDisplayDate"></p>
            </div>
            <button onclick="addRow()" class="mt-4 md:mt-0 bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-lg hover:shadow-indigo-200 active:scale-95">
                + Add Entry
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-8 py-5 text-left text-xs font-bold text-slate-400 uppercase tracking-widest">Task Description</th>
                        <th class="px-8 py-5 text-left text-xs font-bold text-slate-400 uppercase tracking-widest w-48">Date</th>
                        <th class="px-8 py-5 text-center text-xs font-bold text-slate-400 uppercase tracking-widest w-40">Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>

        <div class="p-6 bg-slate-50 flex justify-between items-center border-t border-slate-100">
            <div class="flex gap-6">
                <div class="text-sm"><span class="text-slate-400">Total:</span> <span id="totalCount" class="font-bold text-slate-700">0</span></div>
                <div class="text-sm"><span class="text
