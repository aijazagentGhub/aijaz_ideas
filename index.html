<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz - Strategy Board</title>
    <style>
        :root {
            --primary-blue: #0ea5e9;
            --light-blue: #e0f2fe;
            --bg-color: #f0f9ff;
            --text-main: #334155;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* NEW MENU STYLING */
        .top-nav {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            text-decoration: none;
            color: #64748b;
            padding: 8px 20px;
            background: white;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .nav-tab.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .dashboard-container {
            background-color: white;
            border-radius: 0 12px 12px 12px; /* Adjusted corner for tabs */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .title-group h1 {
            color: var(--primary-blue);
            text-transform: uppercase;
            font-weight: 800;
            font-size: 1.5rem;
            margin: 0;
        }

        .title-group .entry-count {
            color: var(--primary-blue);
            background-color: var(--light-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 5px;
            display: inline-block;
        }

        .btn {
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-new { background-color: var(--primary-blue); color: white; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; color: var(--primary-blue); font-size: 0.75rem; font-weight: 800; padding: 10px 15px; }
        td { background-color: white; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 15px; }
        td:first-child { border-left: 1px solid var(--border-color); border-radius: 8px 0 0 8px; }
        td:last-child { border-right: 1px solid var(--border-color); border-radius: 0 8px 8px 0; }

        input[type="date"], select { border: none; font-family: inherit; font-size: 0.9rem; color: var(--text-main); width: 100%; }
        select { color: var(--primary-blue); font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="nav-tab active">Strategy Board</a>
        <a href="about.html" class="nav-tab">About</a>
        <a href="contact.html" class="nav-tab">Contact</a>
    </div>

    <div class="dashboard-container">
        
        <div class="header-row">
            <div class="title-group">
                <h1>Aijaz - Open Item/Ideas</h1>
                <span class="entry-count">4 Entries</span>
            </div>
            <div class="action-buttons">
                <button class="btn btn-new">+ New Entry</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 20%;">Entry Date</th>
                    <th style="width: 60%;">Task Description</th>
                    <th style="width: 20%;">Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="date" value="2026-04-11"></td>
                    <td>Create web page for marathon tracking...</td>
                    <td><select><option selected>PENDING</option><option>DONE</option></select></td>
                </tr>
                <tr>
                    <td><input type="date" value="2026-04-09"></td>
                    <td>The Asian bank- read and folow</td>
                    <td><select><option selected>PENDING</option><option>DONE</option></select></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
