<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz | Cloud Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-6 border-b flex flex-wrap gap-4 justify-between items-center">
            <h1 class="text-2xl font-black text-slate-800">Aijaz Execution Board</h1>
            <div class="flex gap-2">
                <button onclick="exportToCSV()" class="bg-slate-100 text-slate-600 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors active:scale-95">
                    Export All Ideas
                </button>
                <button onclick="addEntry()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">
                    + New Entry
                </button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-50 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <tr>
                        <th class="px-8 py-4 text-left">Task Description</th>
                        <th class="px-8 py-4 w-40 text-center">Status</th>
                        <th class="px-8 py-4 w-16"></th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0", 
            projectId: "aijazideas",
            appId: "1:822948950064:web:031df081b41175ef3a7df5",
            databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // 2. Initialize
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const entriesRef = db.ref('entries');

        // 3. Listen for changes
        entriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            
            if (data) {
                Object.keys(data).reverse().forEach((key) => {
                    const item = data[key];
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="px-8 py-5">
                            <input type="text" value="${item.task}" onchange="updateRow('${key}', 'task', this.value)" 
                                   class="w-full bg-transparent font-bold text-slate-700 outline-none">
                        </td>
                        <td class="px-8 py-5 text-center">
                            <select onchange="updateRow('${key}', 'status', this.value)" 
                                    class="p-2 rounded-lg text-[10px] font-black uppercase ${item.status === 'Done' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                <option ${item.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option ${item.status === 'Done' ? 'selected' : ''}>Done</option>
                            </select>
                        </td>
                        <td class="px-8 py-5">
                            <button onclick="deleteRow('${key}')" class="text-slate-200 hover:text-red-500">✕</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            }
        });

        // 4. Actions
        function addEntry() {
            entriesRef.push({
                task: "New Strategic Point",
                status: "Pending",
                timestamp: Date.now()
            });
        }

        function updateRow(key, field, value) {
            db.ref('entries/' + key).update({ [field]: value });
        }

        function deleteRow(key) {
            if(confirm("Delete?")) db.ref('entries/' + key).remove();
        }

        // 5. Export Functionality
        function exportToCSV() {
            entriesRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return alert("No data to export!");

                // Create CSV Header
                let csvContent = "Task Description,Status,Date\n";

                // Add Rows
                Object.values(data).forEach(item => {
                    const date = new Date(item.timestamp).toLocaleDateString();
                    // Clean strings to prevent CSV breaking (removing commas)
                    const cleanTask = item.task.replace(/,/g, " ");
                    csvContent += `${cleanTask},${item.status},${date}\n`;
                });

                // Create download link
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Aijaz_Ideas_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }
    </script>
</body>
</html>
