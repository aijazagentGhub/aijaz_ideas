<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz - Elite Marathon Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #FFFFFF;
            --primary-blue: #2563eb; /* New Theme Color */
            --accent-blue: #3b82f6;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --hover-ice-blue: #f0f9ff; /* New Hover Color */
            --status-yellow: #fef9c3;
            --status-green: #dcfce7;
            --status-red: #fee2e2;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; color: var(--text-dark); overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); height: 100vh; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; border-right: 2px solid var(--border-color); transition: all 0.3s ease; position: relative; z-index: 100; }
        body.collapsed .sidebar { width: 80px; padding: 25px 10px; }
        body.collapsed .brand-name, body.collapsed .nav-text { display: none; }
        
        .toggle-btn { position: absolute; right: -15px; top: 30px; background: var(--primary-blue); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 50px; }
        .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--primary-blue) 0%, var(--accent-blue) 100%); border-radius: 8px; flex-shrink: 0; }
        .brand-name { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--primary-blue); letter-spacing: -0.5px; }

        .nav-link { text-decoration: none; color: var(--text-light); font-weight: 600; font-size: 0.9rem; padding: 12px 18px; border-radius: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; transition: 0.2s; }
        .nav-link.active { color: var(--primary-blue); background-color: #eff6ff; }
        .nav-link:hover:not(.active) { background-color: #f8fafc; color: var(--text-dark); }

        /* --- MAIN PANE (New Light Blue Theme) --- */
        .main-pane { 
            flex-grow: 1; padding: 40px; box-sizing: border-box; overflow-y: auto; 
            background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.4)), url('https://raw.githubusercontent.com/aijazagentGhub/aijaz_ideas/main/background.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-color: #0ea5e9; 
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-greeting h1 { font-family: 'Poppins', sans-serif; margin:0; font-weight:800; font-size:2rem; color: white; text-shadow: 0 4px 12px rgba(0,0,0,0.3); letter-spacing: -1px; } 
        
        .btn { border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-new { background-color: white; border: 1px solid var(--border-color); color: var(--text-dark); }
        .btn-new:hover { background-color: #f8fafc; }
        .btn-report { background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%); color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }

        /* --- ENHANCED TABLE --- */
        .table-card { 
            background-color: rgba(255, 255, 255, 0.98); 
            padding: 20px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); 
            overflow-x: auto; border: 1px solid rgba(255,255,255,0.3);
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 950px; } 
        th { background-color: #f8fafc; color: var(--text-light); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 15px; border-bottom: 2px solid var(--border-color); text-align: left; }
        td { border: 1px solid #f1f5f9; padding: 14px 15px; font-size: 0.9rem; transition: background 0.15s ease; }
        
        .header-content { display: flex; align-items: center; gap: 8px; }
        .header-icon { color: var(--primary-blue); font-size: 1.1rem; }

        /* New Light Blue Hover */
        tr:hover td { background-color: var(--hover-ice-blue) !important; }

        .resizer { position: absolute; right: 0; top: 0; width: 4px; cursor: col-resize; height: 100%; }
        .resizer:hover { background: var(--primary-blue); }

        input, select, .editable { border: none; background: transparent; font-family: inherit; width: 100%; color: var(--text-dark); outline: none; font-weight: 500; }
        .editable:empty:before { content: attr(data-placeholder); color: #cbd5e1; font-style: italic; font-weight: 400; }

        .status-select { font-weight: 700; border-radius: 8px; padding: 6px 10px; border: 1px solid transparent; cursor: pointer; }
        .status-yet { background-color: var(--status-yellow); color: #854d0e; }
        .status-completed { background-color: var(--status-green); color: #166534; }
        .status-missed { background-color: var(--status-red); color: #991b1b; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; }
            body.mobile-open .sidebar { left: 0; }
            .main-pane { padding: 20px; } 
        }
    </style>
</head>
<body id="bodyContainer">

    <div class="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">»</button>
        <div class="logo-area">
            <div class="logo-icon"></div>
            <div class="brand-name">FLUXION</div>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-link active"><span>🏃‍♂️</span><span class="nav-text">Marathon</span></a>
            <a href="#" class="nav-link"><span>📖</span><span class="nav-text">Library</span></a>
            <a href="#" class="nav-link"><span>📊</span><span class="nav-text">Workouts</span></a>
        </nav>
    </div>

    <div class="main-pane">
        <div class="header-row">
            <div class="user-greeting">
                <h1>AIJAZ MARATHON TRACKER</h1>
                <p style="color: #e2e8f0; margin-top: 5px; font-weight: 500;">Chronologically sorted by race date.</p>
            </div>
            <div class="action-btns">
                <button class="btn btn-new" onclick="addNewRow()">+ New Event</button>
                <button class="btn btn-report" onclick="exportToCSV()">Export Data</button>
            </div>
        </div>

        <div class="table-card">
            <table id="marathonTable">
                <thead>
                    <tr>
                        <th style="width: 20%;"><div class="header-content"><span class="header-icon">🏃‍♂️</span> Marathon Name</div><div class="resizer"></div></th>
                        <th style="width: 15%;"><div class="header-content"><span class="header-icon">📏</span> Distance</div><div class="resizer"></div></th>
                        <th style="width: 15%;"><div class="header-content"><span class="header-icon">📅</span> Date</div><div class="resizer"></div></th>
                        <th style="width: 15%;"><div class="header-content"><span class="header-icon">⚡</span> Status</div><div class="resizer"></div></th>
                        <th style="width: 15%;"><div class="header-content"><span class="header-icon">📍</span> Location</div><div class="resizer"></div></th>
                        <th style="width: 15%;"><div class="header-content"><span class="header-icon">💰</span> Amount Paid</div><div class="resizer"></div></th>
                        <th style="width: 5%;">Del</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // --- FIREBASE CONFIG (Paste your real keys here) ---
        const firebaseConfig = {
apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0",
  authDomain: "aijazideas.firebaseapp.com",
  databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aijazideas",
  storageBucket: "aijazideas.firebasestorage.app",
  messagingSenderId: "822948950064",
  appId: "1:822948950064:web:031df081b41175ef3a7df5"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleSidebar() {
            const body = document.getElementById('bodyContainer');
            if (window.innerWidth <= 768) body.classList.toggle('mobile-open');
            else body.classList.toggle('collapsed');
        }

        function getStatusClass(val) {
            if (val === 'Completed') return 'status-completed';
            if (val === 'Missed') return 'status-missed';
            return 'status-yet';
        }

        function renderRow(id, item) {
            const tableBody = document.getElementById("tableBody");
            const row = document.createElement("tr");
            const sClass = getStatusClass(item.status);

            row.innerHTML = `
                <td><div class="editable" contenteditable="true" data-placeholder="e.g. London Marathon" onblur="updateDB('${id}', 'name', this.innerText)">${item.name || ''}</div></td>
                <td><div class="editable" contenteditable="true" data-placeholder="e.g. 42.2 km" onblur="updateDB('${id}', 'distance', this.innerText)">${item.distance || ''}</div></td>
                <td><input type="date" value="${item.date || ''}" onchange="updateDB('${id}', 'date', this.value)"></td>
                <td>
                    <select class="status-select ${sClass}" onchange="updateDB('${id}', 'status', this.value); this.className='status-select '+getStatusClass(this.value)">
                        <option value="Yet to happen" ${item.status === 'Yet to happen' ? 'selected' : ''}>Yet to happen</option>
                        <option value="Completed" ${item.status === 'Completed' ? 'selected' : ''}>Completed</option>
                        <option value="Missed" ${item.status === 'Missed' ? 'selected' : ''}>Missed</option>
                    </select>
                </td>
                <td><div class="editable" contenteditable="true" data-placeholder="City/State" onblur="updateDB('${id}', 'location', this.innerText)">${item.location || ''}</div></td>
                <td><input type="number" step="0.01" placeholder="0.00" value="${item.amount || ''}" onblur="updateDB('${id}', 'amount', this.value)"></td>
                <td style="text-align:center;"><button style="color:#ef4444; background:none; border:none; cursor:pointer; font-size:1.2rem;" onclick="deleteFromDB('${id}')">×</button></td>
            `;
            tableBody.appendChild(row);
        }

        function loadData() {
            db.ref('marathons').on('value', (s) => {
                const tableBody = document.getElementById("tableBody");
                tableBody.innerHTML = "";
                const data = s.val();
                if (data) {
                    const items = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                    items.sort((a, b) => {
                        if (!a.date) return 1;
                        if (!b.date) return -1;
                        return new Date(a.date) - new Date(b.date);
                    });
                    items.forEach(item => renderRow(item.id, item));
                }
            });
        }

        function addNewRow() {
            const today = new Date().toISOString().split('T')[0];
            db.ref('marathons').push({ name: "", distance: "", date: today, status: "Yet to happen", location: "", amount: "" });
        }

        function updateDB(id, field, value) { db.ref('marathons/' + id).update({ [field]: value }); }
        function deleteFromDB(id) { if(confirm("Permanently delete this entry?")) db.ref('marathons/' + id).remove(); }
        
        // Export to CSV Functionality
        function exportToCSV() {
            db.ref('marathons').once('value', (snapshot) => {
                const data = snapshot.val();
                let csv = "data:text/csv;charset=utf-8,Name,Distance,Date,Status,Location,Amount\n";
                if(data) {
                    Object.values(data).forEach(v => {
                        csv += `"${v.name}","${v.distance}",${v.date},${v.status},"${v.location}",${v.amount}\n`;
                    });
                    window.open(encodeURI(csv));
                }
            });
        }

        loadData();
    </script>
</body>
</html>
