<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz | Strategy Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* Ultra Light Ice Blue Background */
        body {
            background-color: #f0f9ff;
            min-height: 100vh;
        }
        
        /* Grid styling to make it feel like a professional spreadsheet */
        .editable-cell {
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .editable-cell:hover, .editable-cell:focus-within {
            border-color: #7dd3fc;
            background-color: #ffffff;
            box-shadow: inset 0 0 0 1px #7dd3fc;
        }

        .default-placeholder { opacity: 0.3; font-weight: normal !important; }
        
        /* Date picker custom icon color */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(65%) sepia(50%) saturate(500%) hue-rotate(175deg);
            cursor: pointer;
        }
    </style>
</head>
<body class="p-4 md:p-8 font-sans text-slate-700">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm overflow-hidden border border-sky-100">
        <div class="p-6 border-b border-sky-50 flex flex-wrap gap-4 justify-between items-center bg-white">
            <div>
                <h1 class="text-2xl font-black text-sky-500 uppercase tracking-tight">Execution Board</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="entryCounter" class="bg-sky-100 text-sky-600 text-[10px] px-2 py-0.5 rounded-full font-bold">0 ENTRIES</span>
                    <span class="text-slate-300 text-[10px] font-bold">| UPDATED REAL-TIME</span>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="exportToCSV()" class="text-sky-500 px-5 py-2 rounded-lg font-bold text-sm hover:bg-sky-50 transition-colors">
                    Export Data
                </button>
                <button onclick="addEntry()" class="bg-sky-500 text-white px-6 py-2.5 rounded-lg font-bold shadow-sm hover:bg-sky-600 transition-all active:scale-95 text-sm">
                    + New Entry
                </button>
            </div>
        </div>

        <div class="overflow-x-auto p-4">
            <table class="w-full border-separate border-spacing-2">
                <thead>
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="px-4 py-2 text-left w-48">Execution Date</th>
                        <th class="px-4 py-2 text-left">Task / Strategy Description</th>
                        <th class="px-4 py-2 w-40 text-center">Status</th>
                        <th class="px-4 py-2 w-12"></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0", 
            projectId: "aijazideas",
            appId: "1:822948950064:web:031df081b41175ef3a7df5",
            databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const entriesRef = db.ref('entries');

        const getTodayStr = () => new Date().toISOString().split('T')[0];

        entriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('tableBody');
            const counter = document.getElementById('entryCounter');
            body.innerHTML = '';
            
            if (data) {
                const keys = Object.keys(data).reverse();
                counter.innerText = `${keys.length} ENTRIES`;

                keys.forEach((key) => {
                    const item = data[key];
                    const isDefault = item.task === "Add your Entry";
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="editable-cell rounded-lg px-4 py-3 bg-slate-50/50">
                            <input type="date" 
                                   value="${item.displayDate || getTodayStr()}" 
                                   onchange="updateRow('${key}', 'displayDate', this.value)"
                                   class="bg-transparent w-full text-xs font-bold text-sky-600 outline-none cursor-pointer uppercase">
                        </td>
                        
                        <td class="editable-cell rounded-lg px-4 py-3">
                            <input type="text" 
                                   value="${item.task}" 
                                   onfocus="if(this.value==='Add your Entry') this.select()"
                                   onchange="updateRow('${key}', 'task', this.value)" 
                                   placeholder="Type something..."
                                   class="w-full bg-transparent font-medium text-slate-700 outline-none text-sm ${isDefault ? 'default-placeholder' : ''}">
                        </td>
                        
                        <td class="editable-cell rounded-lg px-2 py-3 bg-slate-50/50 text-center">
                            <select onchange="updateRow('${key}', 'status', this.value)" 
                                    class="bg-transparent w-full text-[10px] font-black uppercase text-center cursor-pointer outline-none ${item.status === 'Done' ? 'text-green-500' : 'text-sky-500'}">
                                <option ${item.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option ${item.status === 'Done' ? 'selected' : ''}>Done</option>
                            </select>
                        </td>
                        
                        <td class="text-center">
                            <button onclick="deleteRow('${key}')" class="text-slate-200 hover:text-red-400 transition-colors p-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } else {
                counter.innerText = `0 ENTRIES`;
            }
        });

        function addEntry() {
            entriesRef.push({
                task: "Add your Entry",
                status: "Pending",
                displayDate: getTodayStr(),
                timestamp: Date.now()
            });
        }

        function updateRow(key, field, value) {
            db.ref('entries/' + key).update({ [field]: value });
        }

        function deleteRow(key) {
            if(confirm("Permanently remove this entry?")) db.ref('entries/' + key).remove();
        }

        function exportToCSV() {
            entriesRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return alert("Nothing to export yet!");
                let csvContent = "Date,Task Description,Status\n";
                Object.values(data).forEach(item => {
                    const date = item.displayDate || "N/A";
                    const cleanTask = item.task.replace(/,/g, " ");
                    csvContent += `${date},${cleanTask},${item.status}\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Strategy_Board_${getTodayStr()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }
    </script>
</body>
</html>
