<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FLUXION</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="app-layout" style="display: flex; min-height: 100vh;">
        <div class="sidebar" style="width: 250px; background: #1a237e; color: white;">
            <h1 style="padding: 20px;">FLUXION</h1>
            <ul style="list-style: none; padding: 0;">
                <li onclick="switchTab('marathon')" style="padding: 20px; cursor: pointer;">🏃 Marathon Tracker</li>
                <li onclick="switchTab('ideas')" style="padding: 20px; cursor: pointer;">💡 Idea Vault</li>
            </ul>
        </div>

        <div id="content-area" style="flex: 1; padding: 20px; background: #f4f7f6;">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script type="module">
        import { renderMarathon } from './marathon.js';
        import { renderIdeas } from './ideas.js';

        // PASTE YOUR REAL FIREBASE CONFIG HERE
        const firebaseConfig = {
       apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0",
  authDomain: "aijazideas.firebaseapp.com",
  databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aijazideas",
  storageBucket: "aijazideas.firebasestorage.app",
  messagingSenderId: "822948950064",
  appId: "1:822948950064:web:031df081b41175ef3a7df5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Switch Logic
        window.switchTab = (tab) => {
            if(tab === 'marathon') renderMarathon(db);
            if(tab === 'ideas') renderIdeas(db);
        };

        // Load Marathon by default
        renderMarathon(db);
    </script>
</body>
</html>
