<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FLUXION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <h1>FLUXION</h1>
            <ul>
                <li onclick="loadTab('marathon')" id="nav-marathon" class="active">🏃 Marathon Tracker</li>
                <li onclick="loadTab('ideas')" id="nav-ideas">💡 Idea Vault</li>
                <li onclick="loadTab('expenses')" id="nav-expenses">💰 Daily Expenses</li>
            </ul>
        </div>
        <div id="content-area" class="main-content">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script type="module">
        import { renderMarathon } from './marathon.js';
        import { renderIdeas } from './ideas.js';

        // REPLACE THIS SECTION WITH YOUR ACTUAL FIREBASE CONFIG FROM YOUR BACKUP
        const firebaseConfig = {
apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0",
  authDomain: "aijazideas.firebaseapp.com",
  databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aijazideas",
  storageBucket: "aijazideas.firebasestorage.app",
  messagingSenderId: "822948950064",
  appId: "1:822948950064:web:031df081b41175ef3a7df5"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        window.loadTab = function(tab) {
            document.querySelectorAll('.sidebar li').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + tab).classList.add('active');

            if (tab === 'marathon') renderMarathon(db);
            if (tab === 'ideas') {
                document.getElementById('content-area').innerHTML = '<h2>💡 Idea Vault</h2><p>Ready to start capturing ideas!</p>';
            }
        };

        // Load Marathon by default
        window.onload = () => loadTab('marathon');
    </script>
</body>
</html>
