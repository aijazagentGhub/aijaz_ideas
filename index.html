<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz - Marathon Live Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #FFFFFF;
            --main-bg: #F0F2F5; 
            --primary-orange: #FF6B00;
            --text-dark: #2A3B4C;
            --text-light: #808D9A;
            --active-tab-bg: #FFEADF;
            --border-color: #cbd5e1;
            --hover-beige: rgba(245, 245, 220, 0.9); 
            --status-yellow: #fef9c3;
            --status-green: #dcfce7;
            --status-red: #fee2e2;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; color: var(--text-dark); overflow: hidden; }

        .sidebar { width: 260px; background-color: var(--sidebar-bg); height: 100vh; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; border-right: 2px solid var(--border-color); transition: all 0.3s ease; position: relative; z-index: 100; }
        body.collapsed .sidebar { width: 80px; padding: 25px 10px; }
        body.collapsed .brand-name, body.collapsed .nav-text { display: none; }
        
        .toggle-btn { position: absolute; right: -15px; top: 30px; background: var(--primary-orange); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 50px; }
        .logo-icon { width: 25px; height: 25px; background: linear-gradient(135deg, #FF6B00 0%, #FFB100 100%); border-radius: 6px; flex-shrink: 0; }
        .brand-name { font-weight: 800; font-size: 1.2rem; color: var(--primary-orange); white-space: nowrap; }

        .nav-link { text-decoration: none; color: var(--text-light); font-weight: 600; font-size: 0.9rem; padding: 12px 18px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 5px; }
        .nav-link.active { color: var(--primary-orange); background-color: var(--active-tab-bg); }

        .main-pane { 
            flex-grow: 1; padding: 40px; box-sizing: border-box; overflow-y: auto; width: 100%;
            background-image: url('https://raw.githubusercontent.com/aijazagentGhub/aijaz_ideas/main/background.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-color: #008080; 
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .user-greeting h1 { margin:0; font-weight:800; font-size:1.8rem; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); } 
        
        .btn { border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .btn-new { background-color: white; border: 1px solid var(--border-color); }
        .btn-report { background: linear-gradient(135deg, #FF6B00 0%, #FFB100 100%); color: white; box-shadow: 0 4px 15px rgba(255,107,0,0.3); }

        .table-card { 
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            overflow-x: auto; border: 1px solid var(--border-color); 
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 900px; } 
        th, td { border: 1px solid var(--border-color); padding: 12px 15px; position: relative; color: var(--text-dark); }
        th { background-color: #f8fafc; color: var(--text-light); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        
        tr:hover td { background-color: var(--hover-beige) !important; }

        .resizer { position: absolute; right: 0; top: 0; width: 5px; cursor: col-resize; user-select: none; height: 100%; }
        .resizer:hover { background: var(--primary-orange); }

        input, select, .editable { border: none; background: transparent; font-family: inherit; width: 100%; color: var(--text-dark); outline: none; }
        
        /* Placeholder Styling */
        .editable:empty:before { content: attr(data-placeholder); color: #cbd5e1; font-style: italic; }

        .status-select { font-weight: 700; border-radius: 4px; padding: 4px; border: 1px solid rgba(0,0,0,0.05); }
        .status-yet { background-color: var(--status-yellow); color: #854d0e; }
        .status-completed { background-color: var(--status-green); color: #166534; }
        .status-missed { background-color: var(--status-red); color: #991b1b; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100%; }
            body.mobile-open .sidebar { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
            .toggle-btn { right: -40px; }
            .main-pane { padding: 20px; } 
        }
    </style>
</head>
<body id="bodyContainer">

    <div class="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">»</button>
        <div class="logo-area">
            <div class="logo-icon"></div>
            <div class="brand-name">Fluxion</div>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-link active"><span class="nav-icon">🏃‍♂️</span><span class="nav-text">Marathon</span></a>
            <a href="about.html" class="nav-link"><span class="nav-icon">📖</span><span class="nav-text">Library</span></a>
            <a href="contact.html" class="nav-link"><span class="nav-icon">📊</span><span class="nav-text">Workouts</span></a>
        </nav>
    </div>

    <div class="main-pane">
        <div class="header-row">
            <div class="user-greeting">
                <h1>AIJAZ MARATHON TRACKER</h1>
                <p style="color:white; text-shadow: 1px 1px 2px black;">Cloud Sync Active</p>
            </div>
            <div class="action-btns">
                <button class="btn btn-new" onclick="addNewRow()">+ New Event</button>
                <button class="btn btn-report" onclick="exportToCSV()">Export</button>
            </div>
        </div>

        <div class="table-card">
            <table id="marathonTable">
                <thead>
                    <tr>
                        <th style="width: 20%;">Marathon Name <div class="resizer"></div></th>
                        <th style="width: 15%;">Distance <div class="resizer"></div></th>
                        <th style="width: 15%;">Date <div class="resizer"></div></th>
                        <th style="width: 15%;">Status <div class="resizer"></div></th>
                        <th style="width: 15%;">Location <div class="resizer"></div></th>
                        <th style="width: 15%;">Amount Paid <div class="resizer"></div></th>
                        <th style="width: 5%;">Del</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
 apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0",
  authDomain: "aijazideas.firebaseapp.com",
  databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aijazideas",
  storageBucket: "aijazideas.firebasestorage.app",
  messagingSenderId: "822948950064",
  appId: "1:822948950064:web:031df081b41175ef3a7df5"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleSidebar() {
            const body = document.getElementById('bodyContainer');
            if (window.innerWidth <= 768) body.classList.toggle('mobile-open');
            else body.classList.toggle('collapsed');
        }

        function getStatusClass(val) {
            if (val === 'Completed') return 'status-completed';
            if (val === 'Missed') return 'status-missed';
            return 'status-yet';
        }

        function renderRow(id, item) {
            const tableBody = document.getElementById("tableBody");
            const row = document.createElement("tr");
            const sClass = getStatusClass(item.status);

            row.innerHTML = `
                <td><div class="editable" contenteditable="true" data-placeholder="Enter marathon name" onblur="updateDB('${id}', 'name', this.innerText)">${item.name || ''}</div></td>
                <td><div class="editable" contenteditable="true" data-placeholder="Enter distance (e.g. 42k)" onblur="updateDB('${id}', 'distance', this.innerText)">${item.distance || ''}</div></td>
                <td><input type="date" value="${item.date || ''}" onchange="updateDB('${id}', 'date', this.value)"></td>
                <td>
                    <select class="status-select ${sClass}" onchange="updateDB('${id}', 'status', this.value); this.className='status-select '+getStatusClass(this.value)">
                        <option value="Yet to happen" ${item.status === 'Yet to happen' ? 'selected' : ''}>Yet to happen</option>
                        <option value="Completed" ${item.status === 'Completed' ? 'selected' : ''}>Completed</option>
                        <option value="Missed" ${item.status === 'Missed' ? 'selected' : ''}>Missed</option>
                    </select>
                </td>
                <td><div class="editable" contenteditable="true" data-placeholder="Enter location" onblur="updateDB('${id}', 'location', this.innerText)">${item.location || ''}</div></td>
                <td><input type="number" step="0.01" placeholder="0.00" value="${item.amount || ''}" onblur="updateDB('${id}', 'amount', this.value)"></td>
                <td style="text-align:center;"><button style="color:red; background:none; border:none; cursor:pointer;" onclick="deleteFromDB('${id}')">×</button></td>
            `;
            tableBody.appendChild(row);
        }

        // Draggable Logic
        document.querySelectorAll('th').forEach(th => {
            const resizer = th.querySelector('.resizer');
            if (!resizer) return;
            let startX, startWidth;
            resizer.addEventListener('mousedown', e => {
                startX = e.pageX;
                startWidth = th.offsetWidth;
                document.addEventListener('mousemove', mouseMoveHandler);
                document.addEventListener('mouseup', mouseUpHandler);
            });
            const mouseMoveHandler = e => {
                const width = startWidth + (e.pageX - startX);
                th.style.width = `${width}px`;
            };
            const mouseUpHandler = () => {
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseup', mouseUpHandler);
            };
        });

        function loadData() {
            db.ref('marathons').on('value', (s) => {
                document.getElementById("tableBody").innerHTML = "";
                if (s.val()) Object.keys(s.val()).forEach(k => renderRow(k, s.val()[k]));
            });
        }

        function addNewRow() {
            // Logic to get today's date automatically
            const today = new Date().toISOString().split('T')[0];
            db.ref('marathons').push({ 
                name: "", 
                distance: "", 
                date: today, 
                status: "Yet to happen", 
                location: "", 
                amount: "" 
            });
        }

        function updateDB(id, field, value) { db.ref('marathons/' + id).update({ [field]: value }); }
        function deleteFromDB(id) { if(confirm("Delete this entry?")) db.ref('marathons/' + id).remove(); }
        
        loadData();
    </script>
</body>
</html>
