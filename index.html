<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUXION - Personal Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ensuring the layout stays consistent */
        .sidebar li { cursor: pointer; transition: 0.3s; }
        .sidebar li:hover { background: rgba(255,255,255,0.1); }
        .active-tab { border-left: 4px solid #fff; padding-left: 10px !important; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-container" style="display: flex;">
        <div class="sidebar" style="width: 250px; height: 100vh; background: #1a237e; color: white; padding: 20px;">
            <h1 style="font-size: 24px; margin-bottom: 30px;">FLUXION</h1>
            <ul style="list-style: none; padding: 0;">
                <li id="tab-marathon" class="active-tab" onclick="loadTab('marathon')" style="padding: 12px 0;">🏃 Marathon Tracker</li>
                <li id="tab-ideas" onclick="loadTab('ideas')" style="padding: 12px 0;">💡 Idea Vault</li>
                <li id="tab-expenses" onclick="loadTab('expenses')" style="padding: 12px 0;">💰 Daily Expenses</li>
            </ul>
        </div>

        <div id="content-area" style="flex: 1; padding: 30px; background: #f4f7f6; overflow-y: auto;">
            
            <div id="marathon-view">
                <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: #333;">Marathon Tracker</h2>
                    <div class="header-actions">
                        <button class="btn-primary" style="background: #2196F3; color: white; padding: 10px 15px; border: none; border-radius: 5px;">+ Add Race</button>
                    </div>
                </div>

                <div class="summary-row" style="display: flex; gap: 20px; margin-bottom: 20px;">
                    </div>
                
                <div class="table-container" style="background: white; border-radius: 8px; padding: 15px;">
                    </div>
                </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script type="module">
        import { renderIdeas } from './ideas.js';

        // 1. YOUR FIREBASE CONFIG (Copy from your backup)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-app.firebaseapp.com",
            databaseURL: "https://your-app-default-rtdb.firebaseio.com",
            projectId: "your-app",
            storageBucket: "your-app.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Save original marathon HTML to memory so we can restore it easily
        const originalMarathonHTML = document.getElementById('marathon-view').innerHTML;

        // 2. THE TAB SWITCHER LOGIC
        window.loadTab = function(tabName) {
            const container = document.getElementById('content-area');
            
            // UI Update: Change active sidebar link
            document.querySelectorAll('.sidebar li').forEach(li => li.classList.remove('active-tab'));
            document.getElementById('tab-' + tabName).classList.add('active-tab');

            if (tabName === 'ideas') {
                renderIdeas(db);
            } else if (tabName === 'marathon') {
                // Restore original view
                container.innerHTML = `<div id="marathon-view">${originalMarathonHTML}</div>`;
                // Re-run your original marathon data loading function if you had one!
            } else if (tabName === 'expenses') {
                container.innerHTML = '<h2>💰 Expense Tracker</h2><p>Development starting soon...</p>';
            }
        };
    </script>
</body>
</html>
