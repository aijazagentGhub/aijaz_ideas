<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz - Marathon Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #FFFFFF;
            --main-bg: #F0F2F5;
            --primary-orange: #FF6B00;
            --text-dark: #2A3B4C;
            --text-light: #808D9A;
            --active-tab-bg: #FFEADF;
            --border-color: #E2E8F0;
            --sidebar-width: 260px;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; background-color: var(--main-bg); color: var(--text-dark); overflow: hidden; }

        /* --- COLLAPSIBLE SIDEBAR --- */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--sidebar-bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 25px; 
            box-sizing: border-box; 
            border-right: 1px solid var(--border-color); 
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
        }

        /* State for collapsed sidebar */
        body.collapsed .sidebar { width: 80px; padding: 25px 15px; }
        body.collapsed .brand-name, body.collapsed .nav-text { display: none; }
        body.collapsed .nav-link { justify-content: center; padding: 12px 0; }

        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 50px; overflow: hidden; }
        .logo-icon { width: 25px; height: 25px; background: linear-gradient(135deg, #FF6B00 0%, #FFB100 100%); border-radius: 6px; flex-shrink: 0; }
        .brand-name { font-weight: 800; font-size: 1.2rem; color: var(--primary-orange); white-space: nowrap; }

        /* Collapse Toggle Button */
        .toggle-btn {
            position: absolute;
            right: -15px;
            top: 30px;
            background: var(--primary-orange);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 101;
        }

        .nav-links { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .nav-link { text-decoration: none; color: var(--text-light); font-weight: 600; font-size: 0.9rem; padding: 12px 18px; border-radius: 12px; display: flex; align-items: center; gap: 15px; }
        .nav-link.active { color: var(--primary-orange); background-color: var(--active-tab-bg); }
        .nav-icon { font-size: 1.2rem; }

        /* --- MAIN CONTENT --- */
        .main-pane { flex-grow: 1; padding: 40px; box-sizing: border-box; overflow-y: auto; transition: all 0.3s ease; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        
        .btn { border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .btn-new { background-color: white; border: 1px solid var(--border-color); }
        .btn-report { background: linear-gradient(135deg, #FF6B00 0%, #FFB100 100%); color: white; }

        /* TABLE CARD */
        .table-card { background-color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 800px; }
        th { text-align: left; color: var(--text-light); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding: 10px 15px; }
        td { background-color: #F8FAFC; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 12px 15px; font-size: 0.9rem; }
        td:first-child { border-left: 1px solid var(--border-color); border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid var(--border-color); border-radius: 0 12px 12px 12px; }

        input, select, .editable { border: none; background: transparent; font-family: inherit; width: 100%; color: var(--text-dark); }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 768px) {
            body { position: relative; }
            .sidebar { position: fixed; left: -260px; height: 100%; }
            body.mobile-open .sidebar { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
            .main-pane { padding: 20px; width: 100%; }
            .toggle-btn { right: -40px; } /* Pull button out on mobile */
        }

        .save-indicator { font-size: 0.8rem; color: #10b981; margin-top: 10px; display: none; }
    </style>
</head>
<body id="bodyContainer">

    <div class="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">»</button>
        <div class="logo-area">
            <div class="logo-icon"></div>
            <div class="brand-name">Fluxion</div>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-link active">
                <span class="nav-icon">🏃‍♂️</span> <span class="nav-text">Marathon</span>
            </a>
            <a href="about.html" class="nav-link">
                <span class="nav-icon">📖</span> <span class="nav-text">Library</span>
            </a>
            <a href="contact.html" class="nav-link">
                <span class="nav-icon">📊</span> <span class="nav-text">Workouts</span>
            </a>
        </nav>
    </div>

    <div class="main-pane">
        <div class="header-row">
            <div class="user-greeting">
                <h1 id="title">AIJAZ MARATHON</h1>
                <p style="font-size: 0.8rem; color: var(--text-light);">CLOUD SYNC ENABLED</p>
            </div>
            <div class="action-btns">
                <button class="btn btn-new" onclick="addNewRow()">+ New</button>
                <button class="btn btn-report" onclick="exportToCSV()">Export</button>
            </div>
        </div>

        <div class="table-card">
            <table id="marathonTable">
                <thead>
                    <tr>
                        <th style="width: 25%;">Name</th>
                        <th style="width: 15%;">Date</th>
                        <th style="width: 18%;">Status</th>
                        <th style="width: 18%;">Location</th>
                        <th style="width: 18%;">Amount</th>
                        <th style="width: 6%;"></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="saveMsg" class="save-indicator">✓ Data Saved</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // Use your Firebase config here
        const firebaseConfig = {
apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0",
  authDomain: "aijazideas.firebaseapp.com",
  databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aijazideas",
  storageBucket: "aijazideas.firebasestorage.app",
  messagingSenderId: "822948950064",
  appId: "1:822948950064:web:031df081b41175ef3a7df5"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- UI LOGIC ---
        function toggleSidebar() {
            const body = document.getElementById('bodyContainer');
            const btn = document.querySelector('.toggle-btn');
            
            if (window.innerWidth <= 768) {
                body.classList.toggle('mobile-open');
            } else {
                body.classList.toggle('collapsed');
                btn.innerText = body.classList.contains('collapsed') ? '«' : '»';
            }
        }

        // --- DATA LOGIC ---
        function loadData() {
            db.ref('marathons').on('value', (snapshot) => {
                const tableBody = document.getElementById("tableBody");
                tableBody.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => renderRow(key, data[key]));
                }
            });
        }

        function renderRow(id, item) {
            const tableBody = document.getElementById("tableBody");
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><div class="editable" contenteditable="true" onblur="updateDB('${id}', 'name', this.innerText)">${item.name}</div></td>
                <td><input type="date" value="${item.date}" onchange="updateDB('${id}', 'date', this.value)"></td>
                <td>
                    <select onchange="updateDB('${id}', 'status', this.value)">
                        <option ${item.status === 'Yet to happen' ? 'selected' : ''}>Yet to happen</option>
                        <option ${item.status === 'Completed' ? 'selected' : ''}>Completed</option>
                        <option ${item.status === 'Missed' ? 'selected' : ''}>Missed</option>
                    </select>
                </td>
                <td><div class="editable" contenteditable="true" onblur="updateDB('${id}', 'location', this.innerText)">${item.location}</div></td>
                <td><input type="number" step="0.01" value="${item.amount}" onblur="updateDB('${id}', 'amount', this.value)"></td>
                <td><button style="color:red; background:none; border:none; cursor:pointer;" onclick="deleteFromDB('${id}')">×</button></td>
            `;
            tableBody.appendChild(row);
        }

        function addNewRow() {
            db.ref('marathons').push({
                name: "Event Name",
                date: new Date().toISOString().split('T')[0],
                status: "Yet to happen",
                location: "Location",
                amount: 0.00
            });
        }

        function updateDB(id, field, value) {
            db.ref('marathons/' + id).update({ [field]: value });
            document.getElementById("saveMsg").style.display = "block";
            setTimeout(() => document.getElementById("saveMsg").style.display = "none", 2000);
        }

        function deleteFromDB(id) {
            if(confirm("Delete entry?")) db.ref('marathons/' + id).remove();
        }

        function exportToCSV() {
            db.ref('marathons').once('value', (snapshot) => {
                const data = snapshot.val();
                let csv = "data:text/csv;charset=utf-8,Name,Date,Status,Location,Amount\n";
                if(data) {
                    Object.values(data).forEach(v => {
                        csv += `"${v.name}",${v.date},${v.status},"${v.location}",${v.amount}\n`;
                    });
                    window.open(encodeURI(csv));
                }
            });
        }

        loadData();
    </script>
</body>
</html>
