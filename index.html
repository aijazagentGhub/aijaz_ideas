<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aijaz | Cloud Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* Blue Gradient Background from your image */
        body {
            background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
            min-height: 100vh;
        }
        .task-row:hover { background-color: #f0f7ff; transition: 0.2s; }
        .default-placeholder { opacity: 0.3; font-weight: normal !important; }
        
        /* Blue themed date picker icon */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(39%) sepia(68%) saturate(1214%) hue-rotate(185deg) brightness(95%) contrast(92%);
            cursor: pointer;
        }
    </style>
</head>
<body class="p-4 md:p-10 font-sans text-slate-800">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8 border-b border-blue-50 flex flex-wrap gap-4 justify-between items-center bg-white">
            <div>
                <h1 class="text-3xl font-black text-blue-600 uppercase tracking-tight">Aijaz Execution Board</h1>
                <p class="text-blue-400 text-sm font-bold">8 Essential Strategic Steps</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportToCSV()" class="border-2 border-blue-500 text-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-500 hover:text-white transition-all active:scale-95">
                    Export All Ideas
                </button>
                <button onclick="addEntry()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-blue-700 hover:shadow-blue-200 transition-all active:scale-95">
                    + New Entry
                </button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-blue-50 text-xs font-bold text-blue-400 uppercase tracking-widest">
                    <tr>
                        <th class="px-8 py-5 text-left w-56">Execution Date</th>
                        <th class="px-8 py-5 text-left">Task Description</th>
                        <th class="px-8 py-5 w-44 text-center">Status</th>
                        <th class="px-8 py-5 w-16"></th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-blue-50"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0", 
            projectId: "aijazideas",
            appId: "1:822948950064:web:031df081b41175ef3a7df5",
            databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const entriesRef = db.ref('entries');

        // Defaults to March 29, 2026 based on your current session
        const getTodayStr = () => new Date().toISOString().split('T')[0];

        entriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            
            if (data) {
                Object.keys(data).reverse().forEach((key) => {
                    const item = data[key];
                    const isDefault = item.task === "Add your Entry";
                    
                    const tr = document.createElement('tr');
                    tr.className = "task-row group";
                    tr.innerHTML = `
                        <td class="px-8 py-6">
                            <input type="date" 
                                   value="${item.displayDate || getTodayStr()}" 
                                   onchange="updateRow('${key}', 'displayDate', this.value)"
                                   class="bg-transparent text-sm font-bold text-blue-500 outline-none cursor-pointer">
                        </td>
                        <td class="px-8 py-6">
                            <input type="text" 
                                   value="${item.task}" 
                                   onfocus="if(this.value==='Add your Entry') this.select()"
                                   onchange="updateRow('${key}', 'task', this.value)" 
                                   class="w-full bg-transparent font-bold text-slate-700 outline-none focus:text-blue-600 transition-colors ${isDefault ? 'default-placeholder' : ''}">
                        </td>
                        <td class="px-8 py-6 text-center">
                            <select onchange="updateRow('${key}', 'status', this.value)" 
                                    class="p-2 px-4 rounded-full text-[10px] font-black uppercase border-2 cursor-pointer transition-all ${item.status === 'Done' ? 'bg-green-50 border-green-200 text-green-600' : 'bg-blue-50 border-blue-100 text-blue-600'}">
                                <option ${item.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option ${item.status === 'Done' ? 'selected' : ''}>Done</option>
                            </select>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <button onclick="deleteRow('${key}')" class="text-slate-300 hover:text-red-500 transition-colors font-bold text-lg">✕</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            }
        });

        function addEntry() {
            entriesRef.push({
                task: "Add your Entry",
                status: "Pending",
                displayDate: getTodayStr(),
                timestamp: Date.now()
            });
        }

        function updateRow(key, field, value) {
            db.ref('entries/' + key).update({ [field]: value });
        }

        function deleteRow(key) {
            if(confirm("Permanently remove this strategic idea?")) db.ref('entries/' + key).remove();
        }

        function exportToCSV() {
            entriesRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return alert("Nothing to export yet!");
                let csvContent = "Date,Task Description,Status\n";
                Object.values(data).forEach(item => {
                    const date = item.displayDate || "N/A";
                    const cleanTask = item.task.replace(/,/g, " ");
                    csvContent += `${date},${cleanTask},${item.status}\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Aijaz_Strategy_Export_${getTodayStr()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }
    </script>
</body>
</html>
